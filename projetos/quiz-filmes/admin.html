<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Quiz de Filmes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body class="app-body">
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-grid"></div>

  <header class="topbar glass">
    <div class="brand">
      <div class="brand-logo">🛠️</div>
      <div>
        <h1>Painel Admin</h1>
        <p>Adicionar filmes, cards e perguntas</p>
      </div>
    </div>

    <nav class="topbar-actions">
      <a href="index.html" class="ghost-btn link-btn">Voltar</a>
      <button id="logoutBtn" class="danger-btn">Sair</button>
    </nav>
  </header>

  <main class="container">
    <section class="hero-banner glass">
      <div class="hero-copy">
        <span class="pill">Área administrativa</span>
        <h2>Cadastre novos filmes e perguntas</h2>
        <p>Somente usuários com <strong>isAdmin: true</strong> no Firestore podem usar esta página.</p>
      </div>
    </section>

    <section class="admin-grid">
      <div class="admin-card glass">
        <h3>Cadastrar filme</h3>
        <form id="movieForm" class="form-grid">
          <input type="text" id="movieTitle" placeholder="Nome do filme / série" required />
          <input type="text" id="movieImage" placeholder="URL da capa do card" required />
          <textarea id="movieDescription" placeholder="Descrição curta" rows="4" required></textarea>
          <button type="submit" class="primary-btn">Salvar filme</button>
        </form>
      </div>

      <div class="admin-card glass">
        <h3>Adicionar pergunta</h3>
        <form id="questionForm" class="form-grid">
          <select id="questionMovieSelect" required>
            <option value="">Selecione um filme</option>
          </select>

          <input type="text" id="questionInput" placeholder="Pergunta" required />
          <input type="text" id="option1" placeholder="Opção 1" required />
          <input type="text" id="option2" placeholder="Opção 2" required />
          <input type="text" id="option3" placeholder="Opção 3" required />
          <input type="text" id="option4" placeholder="Opção 4" required />

          <select id="correctAnswer" required>
            <option value="">Qual opção é a correta?</option>
            <option value="0">Opção 1</option>
            <option value="1">Opção 2</option>
            <option value="2">Opção 3</option>
            <option value="3">Opção 4</option>
          </select>

          <button type="submit" class="success-btn">Salvar pergunta</button>
        </form>
      </div>
    </section>

    <section class="admin-card glass">
      <h3>Filmes cadastrados</h3>
      <div id="adminMovieList" class="admin-movie-list"></div>
    </section>
  </main>

  <div id="toast" class="toast hidden"></div>

  <script type="module" src="firebase-config.js"></script>
  <script type="module" src="admin.js"></script>
</body>
</html>
